<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fish It! | Verifying Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Sora:wght@600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --ink: #0f172a;
            --muted: #64748b;
            --panel: rgba(255, 255, 255, 0.9);
            --border: rgba(15, 23, 42, 0.14);
            --success: #047857;
            --accent: #0ea5e9;
            --accent-2: #22c55e;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Manrope", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 12% 16%, rgba(34, 197, 94, 0.22), transparent 34%),
                radial-gradient(circle at 86% 10%, rgba(14, 165, 233, 0.22), transparent 36%),
                linear-gradient(140deg, #f4fbff, #f7f6ff);
            overflow: hidden;
            padding: 1.1rem;
        }

        .blob {
            position: fixed;
            border-radius: 999px;
            filter: blur(60px);
            z-index: -1;
            opacity: 0.35;
            animation: drift 8s ease-in-out infinite;
        }

        .blob-a {
            width: 280px;
            height: 280px;
            top: -70px;
            left: -40px;
            background: #22c55e;
        }

        .blob-b {
            width: 300px;
            height: 300px;
            right: -70px;
            bottom: -90px;
            background: #0ea5e9;
            animation-delay: -2s;
        }

        @keyframes drift {
            0% {
                transform: translate3d(0, 0, 0);
            }

            50% {
                transform: translate3d(0, 14px, 0);
            }

            100% {
                transform: translate3d(0, 0, 0);
            }
        }

        .card {
            width: min(560px, 95vw);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 20px 45px rgba(15, 23, 42, 0.14);
            backdrop-filter: blur(12px);
            padding: 1.4rem 1.35rem 1.2rem;
            display: grid;
            gap: 1rem;
        }

        .badge {
            justify-self: start;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border-radius: 999px;
            border: 1px solid #bde6f8;
            background: #e8f6ff;
            color: #0c4a6e;
            font-size: 0.74rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.4rem 0.72rem;
        }

        .title {
            margin: 0;
            font-family: "Sora", "Segoe UI", sans-serif;
            font-size: clamp(1.35rem, 4vw, 1.9rem);
            letter-spacing: -0.02em;
        }

        .subtitle {
            margin: 0;
            color: var(--muted);
            font-size: 0.95rem;
            font-weight: 700;
            line-height: 1.45;
        }

        .verify-visual {
            display: grid;
            gap: 0.62rem;
        }

        .progress-track {
            height: 10px;
            border-radius: 999px;
            overflow: hidden;
            border: 1px solid #cde3f1;
            background: #e8f1f7;
        }

        .progress-bar {
            height: 100%;
            width: 0;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            animation: fill 1.9s ease-out forwards;
        }

        @keyframes fill {
            from {
                width: 0;
            }

            to {
                width: 100%;
            }
        }

        .pulse-dots {
            display: inline-flex;
            gap: 0.38rem;
            align-items: center;
            color: #0284c7;
            font-size: 0.84rem;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: #0ea5e9;
            animation: pulse 0.9s ease-in-out infinite;
        }

        .pulse-dot:nth-child(2) {
            animation-delay: 0.12s;
        }

        .pulse-dot:nth-child(3) {
            animation-delay: 0.24s;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.75);
                opacity: 0.45;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
            }

            100% {
                transform: scale(0.75);
                opacity: 0.45;
            }
        }

        .status-text {
            margin: 0;
            min-height: 1.4rem;
            color: #0369a1;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
        }

        .go-btn {
            text-decoration: none;
            border: 1px solid #0ea5e9;
            background: linear-gradient(145deg, #38bdf8, #0ea5e9);
            color: #f8fdff;
            font-weight: 800;
            font-size: 0.86rem;
            letter-spacing: 0.02em;
            padding: 0.66rem 0.95rem;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.25);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .go-btn.ready {
            opacity: 1;
            pointer-events: auto;
        }

        .card.success .badge {
            border-color: #a7f3d0;
            background: #ddfdf1;
            color: #065f46;
        }

        .card.success .status-text {
            color: var(--success);
        }
    </style>
</head>

<body>
    <div class="blob blob-a" aria-hidden="true"></div>
    <div class="blob blob-b" aria-hidden="true"></div>

    <main class="card" id="verify-card">
        <div class="badge" id="badge-text">Cloud Sync Gateway</div>
        <h1 class="title" id="title-text">Verifying your secure access code...</h1>
        <p class="subtitle" id="subtitle-text">Please wait a moment while we activate your account link.</p>

        <div class="verify-visual">
            <div class="progress-track" aria-hidden="true">
                <div class="progress-bar"></div>
            </div>
            <div class="pulse-dots" aria-hidden="true">
                <span class="pulse-dot"></span>
                <span class="pulse-dot"></span>
                <span class="pulse-dot"></span>
                Verifying
            </div>
        </div>

        <p class="status-text" id="status-text">Checking token signature...</p>

        <div class="actions">
            <a id="go-main-btn" class="go-btn" href="#">Go To Main Page</a>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://wlyrmqfaiixoohdyizam.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_h3m3EuajBFphREc0LpVN3g_PWcWv9gM';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const card = document.getElementById('verify-card');
        const titleText = document.getElementById('title-text');
        const subtitleText = document.getElementById('subtitle-text');
        const statusText = document.getElementById('status-text');
        const goMainBtn = document.getElementById('go-main-btn');

        function getBasePath() {
            const suffix = '/auth/callback.html';
            const path = window.location.pathname;
            if (path.endsWith(suffix)) return path.slice(0, -suffix.length) || '';
            return '';
        }

        function getMainPageUrl() {
            return `${window.location.origin}${getBasePath()}/`;
        }

        function setStatus(message) {
            statusText.textContent = message;
        }

        function showReady(autoRedirect = true) {
            card.classList.add('success');
            titleText.textContent = 'Registration complete.';
            subtitleText.textContent = 'You are registered and ready to synchronize data.';
            setStatus('Session verified. Redirecting to the main page...');
            goMainBtn.classList.add('ready');

            if (autoRedirect) {
                setTimeout(() => {
                    window.location.href = getMainPageUrl();
                }, 1200);
            }
        }

        function showFallback() {
            card.classList.add('success');
            titleText.textContent = 'Link processed.';
            subtitleText.textContent = 'You can continue to the game and log in if needed.';
            setStatus('Token not auto-applied, but navigation is ready.');
            goMainBtn.classList.add('ready');
        }

        async function verifyFromUrl() {
            const hash = new URLSearchParams(window.location.hash.replace(/^#/, ''));
            const query = new URLSearchParams(window.location.search);
            let applied = false;

            setStatus('Checking token signature...');

            const accessToken = hash.get('access_token');
            const refreshToken = hash.get('refresh_token');
            if (accessToken && refreshToken) {
                const { error } = await supabaseClient.auth.setSession({
                    access_token: accessToken,
                    refresh_token: refreshToken
                });
                if (!error) applied = true;
            }

            if (!applied && query.get('code')) {
                setStatus('Exchanging authorization code...');
                const { error } = await supabaseClient.auth.exchangeCodeForSession(query.get('code'));
                if (!error) applied = true;
            }

            if (!applied && query.get('token_hash') && query.get('type')) {
                setStatus('Confirming email token...');
                const { error } = await supabaseClient.auth.verifyOtp({
                    token_hash: query.get('token_hash'),
                    type: query.get('type')
                });
                if (!error) applied = true;
            }

            setStatus('Finalizing cloud session...');
            await supabaseClient.auth.getSession();
            return applied;
        }

        (async function run() {
            const steps = [
                'Checking token signature...',
                'Activating user profile...',
                'Preparing cloud synchronization...'
            ];

            let i = 0;
            const ticker = setInterval(() => {
                i = (i + 1) % steps.length;
                setStatus(steps[i]);
            }, 520);

            goMainBtn.href = getMainPageUrl();

            try {
                const ok = await verifyFromUrl();
                clearInterval(ticker);
                setTimeout(() => ok ? showReady(true) : showFallback(), 350);
            } catch (err) {
                console.error('Callback verification error:', err);
                clearInterval(ticker);
                showFallback();
            }
        })();
    </script>
</body>

</html>
